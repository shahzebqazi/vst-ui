<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://sqazi.sh/vst-ui/" />
    <title>VST UI Mockups</title>
    <link rel="stylesheet" href="styles/backgrounds.css" />
  </head>
  <body class="bg-blueprint">
    <main class="app-shell">
      <section class="panel left-panel" aria-label="Mockup controls">
        <h1 class="app-title">
          <span class="title-icon" aria-hidden="true">&#xf1e6;</span>VST UI Mockups
        </h1>

        <div class="control-block">
          <h2 class="section-title section-title--themes" id="themes-heading">Themes</h2>
          <div
            class="btn-row theme-row"
            role="group"
            aria-labelledby="themes-heading"
          >
            <button
              type="button"
              class="chrome-btn chrome-btn--icon-only"
              data-theme="bg-blueprint"
              aria-label="Blueprint theme"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf00a;</span>
              <span class="btn-label">Blueprint</span>
            </button>
            <button
              type="button"
              class="chrome-btn chrome-btn--icon-only"
              data-theme="bg-paper"
              aria-label="Paper theme"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf15c;</span>
              <span class="btn-label">Paper</span>
            </button>
            <button
              type="button"
              class="chrome-btn chrome-btn--icon-only"
              data-theme="bg-dark-dots"
              aria-label="Dark Dots theme"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf186;</span>
              <span class="btn-label">Dark Dots</span>
            </button>
          </div>
        </div>

        <div class="control-block">
          <h2 class="section-title section-title--mockups" id="mockups-heading">
            Mockups
          </h2>
          <div
            class="btn-row mockup-row"
            role="group"
            aria-labelledby="mockups-heading"
          >
            <a
              class="chrome-btn chrome-btn--icon-only mockup-link is-active"
              href="mockups/home.html"
              target="mockupViewport"
              data-mockup="home"
              aria-label="Main mockup"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf015;</span>
              <span class="btn-label">Main</span>
            </a>
            <a
              class="chrome-btn chrome-btn--icon-only mockup-link"
              href="mockups/capture-modes.html"
              target="mockupViewport"
              data-mockup="capture-modes"
              aria-label="Controls mockup"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf1de;</span>
              <span class="btn-label">Controls</span>
            </a>
            <a
              class="chrome-btn chrome-btn--icon-only mockup-link"
              href="mockups/history.html"
              target="mockupViewport"
              data-mockup="history"
              aria-label="Presets mockup"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf1da;</span>
              <span class="btn-label">Presets</span>
            </a>
            <a
              class="chrome-btn chrome-btn--icon-only mockup-link"
              href="mockups/export.html"
              target="mockupViewport"
              data-mockup="export"
              aria-label="Export mockup"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf019;</span>
              <span class="btn-label">Export</span>
            </a>
            <a
              class="chrome-btn chrome-btn--icon-only mockup-link"
              href="mockups/settings.html"
              target="mockupViewport"
              data-mockup="settings"
              aria-label="Settings mockup"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf013;</span>
              <span class="btn-label">Settings</span>
            </a>
            <a
              class="chrome-btn chrome-btn--icon-only mockup-link"
              href="mockups/help.html"
              target="mockupViewport"
              data-mockup="help"
              aria-label="Help mockup"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf059;</span>
              <span class="btn-label">Help</span>
            </a>
          </div>
        </div>

        <details class="documents-block control-block">
          <summary
            class="section-title section-title--documents"
            id="documents-heading"
          >
            <span class="summary-chevron" aria-hidden="true"></span>
            Documents
          </summary>
          <div
            class="btn-row doc-row"
            role="group"
            aria-labelledby="documents-heading"
          >
            <a
              class="chrome-btn doc-link"
              href="documents/executive-overview.html"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf0e3;</span>
              Executive overview
            </a>
            <a
              class="chrome-btn doc-link"
              href="documents/requirements-cto.html"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf085;</span>
              CTO requirements
            </a>
            <a
              class="chrome-btn doc-link"
              href="documents/design-specification.html"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="btn-glyph" aria-hidden="true">&#xf1fc;</span>
              Design specification
            </a>
          </div>
        </details>
      </section>

      <section class="panel right-panel">
        <div class="phone-frame">
          <iframe
            title="Mobile mockup viewport"
            name="mockupViewport"
            src="mockups/home.html"
          ></iframe>
        </div>
      </section>
    </main>

    <script>
      (function () {
        var themeButtons = document.querySelectorAll("[data-theme]");
        var mockupLinks = document.querySelectorAll(".mockup-link");

        themeButtons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            document.body.classList.remove("bg-blueprint", "bg-paper", "bg-dark-dots");
            document.body.classList.add(btn.getAttribute("data-theme"));
            themeButtons.forEach(function (b) {
              b.classList.toggle("is-active", b === btn);
            });
          });
        });

        document.querySelector("[data-theme=\"bg-blueprint\"]").classList.add("is-active");

        mockupLinks.forEach(function (link) {
          link.addEventListener("click", function () {
            mockupLinks.forEach(function (l) {
              l.classList.remove("is-active");
            });
            link.classList.add("is-active");
          });
        });
      })();
    </script>
  </body>
</html>
