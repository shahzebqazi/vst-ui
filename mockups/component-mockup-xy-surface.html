<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XY control surface mockup</title>
    <link rel="stylesheet" href="components-mockup.css" />
  </head>
  <body>
    <main class="components-page components-page--single">
      <p class="component-back-link">
        <a href="components-chromeless.html">← Component mockups</a>
      </p>
      <section class="component-showcase" aria-labelledby="t-xy">
        <h1 class="component-showcase__name" id="t-xy">XY control surface mockup</h1>
        <div class="component-demo">
          <div class="ui-xypad" role="img" aria-label="X Y pad">
            <span class="ui-xypad__dot" aria-hidden="true"></span>
          </div>
        </div>
        <div class="component-wireframe" aria-label="Wireframe">
          <div class="component-wireframe__canvas component-wireframe__canvas--xypad">
            <div class="wf" aria-hidden="true"></div>
          </div>
          <p class="wireframe-legend">
            <strong>Wireframe</strong> — Two-axis surface and cursor position.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
