<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Step control mockup</title>
    <link rel="stylesheet" href="components-mockup.css" />
  </head>
  <body>
    <main class="components-page components-page--single">
      <p class="component-back-link">
        <a href="components-list.html">← Component mockups</a>
      </p>
      <section class="component-showcase" aria-labelledby="t-st">
        <h1 class="component-showcase__name" id="t-st">Step control mockup</h1>
        <div class="component-demo">
          <div class="ui-steps" role="group" aria-label="Harmonics">
            <button type="button" class="ui-steps__step is-on" aria-pressed="true"></button>
            <button type="button" class="ui-steps__step is-on" aria-pressed="true"></button>
            <button type="button" class="ui-steps__step" aria-pressed="false"></button>
            <button type="button" class="ui-steps__step" aria-pressed="false"></button>
          </div>
        </div>
        <div class="component-wireframe" aria-label="Wireframe">
          <div class="component-wireframe__canvas component-wireframe__canvas--steps">
            <div class="wf" aria-hidden="true">
              <span></span><span></span><span></span><span></span>
            </div>
          </div>
          <p class="wireframe-legend">
            <strong>Wireframe</strong> — Discrete steps / segmented control.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
