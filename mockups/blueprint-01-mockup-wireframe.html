<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Launch image</title>
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="blueprint-mockup-wireframe.css" />
  </head>
  <body>
    <div class="launch-window" role="application" aria-label="Launch image preview">
      <header class="launch-window__titlebar">
        <button
          type="button"
          class="launch-window__close"
          id="launch-close"
          aria-label="Close mockup"
          title="Close"
        ></button>
        <span class="launch-window__title">Launch image</span>
      </header>
      <div class="launch-window__body">
        <div class="landing-art" aria-hidden="false">
          <div class="landing-art__inner">
            <div class="landing-art__mark" aria-hidden="true">
              <img src="../assets/favicon.svg" alt="" width="64" height="64" />
            </div>
            <div class="landing-art__spinner" aria-hidden="true"></div>
            <div class="landing-art__bar" aria-hidden="true"></div>
            <h1 class="landing-art__title">Launch image</h1>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var btn = document.getElementById("launch-close");
        if (btn)
          btn.addEventListener("click", function () {
            try {
              parent.postMessage({ type: "vst-ui-close-mockup" }, "*");
            } catch (e) {}
          });
      })();
    </script>
  </body>
</html>
