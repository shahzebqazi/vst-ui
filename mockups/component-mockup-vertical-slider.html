<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vertical slider mockup</title>
    <link rel="stylesheet" href="components-mockup.css" />
  </head>
  <body>
    <main class="components-page components-page--single">
      <p class="component-back-link">
        <a href="components-chromeless.html">← Component mockups</a>
      </p>
      <section class="component-showcase" aria-labelledby="t-v">
        <h1 class="component-showcase__name" id="t-v">Vertical slider mockup</h1>
        <div class="component-demo component-demo--tall">
          <div class="ui-vslider">
            <input type="range" min="0" max="100" value="65" aria-label="Level" />
          </div>
        </div>
        <div class="component-wireframe" aria-label="Wireframe">
          <div class="component-wireframe__canvas component-wireframe__canvas--vslider">
            <div class="wf" aria-hidden="true"></div>
          </div>
          <p class="wireframe-legend">
            <strong>Wireframe</strong> — Vertical fader track and thumb.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
