<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown mockup</title>
    <link rel="stylesheet" href="components-mockup.css" />
  </head>
  <body>
    <main class="components-page components-page--single">
      <p class="component-back-link">
        <a href="components-chromeless.html">← Component mockups</a>
      </p>
      <section class="component-showcase" aria-labelledby="t-sel">
        <h1 class="component-showcase__name" id="t-sel">Dropdown mockup</h1>
        <div class="component-demo">
          <div class="ui-select-wrap">
            <label class="visually-hidden" for="demo-select">Preset</label>
            <select class="ui-select" id="demo-select">
              <option>Warm tape</option>
              <option>Hard clip</option>
              <option>Soft fold</option>
            </select>
          </div>
        </div>
        <div class="component-wireframe" aria-label="Wireframe">
          <div class="component-wireframe__canvas component-wireframe__canvas--select">
            <div class="wf" aria-hidden="true"></div>
          </div>
          <p class="wireframe-legend">
            <strong>Wireframe</strong> — Dropdown / select boundary.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
